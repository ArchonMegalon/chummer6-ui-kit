repo: chummer-ui-kit
last_reviewed: 2026-04-12
truth_model: explicit_u_spine
as_of: 2026-04-12
notes:
  - "ETA dates are planning targets, not guarantees."
  - "Completion is tracked per milestone as percent_complete with evidence and remaining queue count."
  - "This re-entry reconciles milestone status with implemented evidence already captured in WORKLIST.md and verify gates."

completion_truth_model:
  percent_scale: 0_to_100
  status_rules:
    complete: percent_complete == 100 and remaining_queue_work_count == 0
    in_progress: percent_complete > 0 and percent_complete < 100
    open: percent_complete <= 15 and backlog is mostly unpublished or unstarted
  percent_basis: weighted evidence judgment tied to published runnable backlog and implemented closure evidence

eta_truth_model:
  date_type: target_date
  confidence_levels:
    high: delivery is mostly repo-local with clear closure evidence path
    medium: requires moderate implementation and limited downstream adoption proof
    low: requires significant implementation and/or cross-repo adoption evidence

rollup:
  milestones_total: 10
  status_counts:
    complete: 9
    in_progress: 0
    open: 1
  weighted_completion_percent: 92
  eta_coverage_percent: 100
  milestones_missing_eta: []
  completion_truth_partial: false

