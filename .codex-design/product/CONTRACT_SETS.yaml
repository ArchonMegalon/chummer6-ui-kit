    deprecation_policy: Deprecations must be staged in design and hub, preserve replay-safe continuity for at least one promoted release cycle, and publish migration guidance before removal.
    consumers:
      - chummer6-ui
      - chummer6-mobile
      - chummer6-media-factory
      - internal service clients
    forbidden_source_copies:
      - chummer6-ui
      - chummer6-mobile
      - chummer6-media-factory

  - id: Chummer.Control.Contracts
    owner_repo: chummer6-hub
    purpose: Product-control contracts for support intake, case status, clustered signal packets, decision routing, release-readiness, and closure truth.
