packages:
  - id: Chummer.Engine.Contracts
    owner_repo: chummer6-core
    purpose: Deterministic engine/runtime/explain/reducer DTOs.
    status: complete
    versioning_policy: SemVer. Breaking runtime or explain payload meaning is major; additive DTO fields or projections are minor; compatible clarifications are patch.
    deprecation_policy: Deprecations land in design and core first, remain supported for at least one promoted release cycle, and require milestone/blocker updates before removal.
    consumers:
      - chummer6-ui
      - chummer6-mobile
      - chummer6-hub
    forbidden_source_copies:
      - chummer6-ui
      - chummer6-mobile
      - chummer6-hub

  - id: Chummer.Play.Contracts
    owner_repo: chummer6-hub
    purpose: Play/mobile/service seam for hosted play APIs, role-shell transport DTOs, replay checkpoints, play-safe projections, and the `Chummer.Play.Contracts.Interop` namespace family for round-trip portability DTOs.
    status: complete
    versioning_policy: SemVer. Breaking play-shell API or transport semantics is major; additive projections or request fields are minor; compatible clarifications are patch.
    deprecation_policy: Deprecations must be announced in design and hub first, keep replay-safe compatibility for at least one promoted release cycle, and update blockers before semantic removal.
    consumers:
      - chummer6-mobile
      - chummer6-ui
    forbidden_source_copies:
      - chummer6-mobile
      - chummer6-ui

  - id: Chummer.Run.Contracts
